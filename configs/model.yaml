model:
  hidden_dim: 128
  num_layers: 1
  dropout: 0.1

embedding:
  diag_dim: 128
  proc_dim: 128
  drug_dim: 128
  lab_dim: 64
  vital_dim: 64
  time_dim: 32

sequence:
  rnn_type: gru
  bidirectional: false

retrieval:
  top_k: 5
  temporal_decay_alpha: 0.05
  exclude_same_stay: true
  backend: bruteforce
  use_faiss_if_available: true
  graph_top_k: 5

training:
  device: cuda

history_selector:
  dropout: 0.1
  score_bias_weight: 0.5
  self_top_k: 3
  neighbor_top_k: 3
  use_retrieval_bias: true

fusion:
  dropout: 0.1
  strategy: gated

hypergraph:
  num_layers: 2
  dropout: 0.1
  num_group_prototypes: 8
  use_semantic_edges: true
  use_weighted_edges: true
  prototype_top_k: 2
